services:
  db:
    image: mysql:8.0
    container_name: biblioteca_db
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biblioteca_ateneo
      MYSQL_USER: biblio_user
      MYSQL_PASSWORD: biblio_password
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  web:
    image: php:8.2-apache
    container_name: biblioteca_web
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    command: >
      bash -c "docker-php-ext-install mysqli pdo pdo_mysql && apache2-foreground"
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: biblioteca_pma
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root

volumes:
  db_data: